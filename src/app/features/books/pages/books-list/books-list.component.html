<div class="books-list">
  <div class="books-list__header">
    <h1>Kitaplığım</h1>
    <button class="books-list__add-btn" (click)="goToAddBook()">
      + Yeni Kitap Ekle
    </button>
  </div>
  <div class="books-list__stats">
    <div class="stat-card">
      <span class="stat-card__value">{{ stats().toplam }}</span>
      <span class="stat-card__label">Toplam Kitap</span>
    </div>
    <div class="stat-card stat-card--okunacak">
      <span class="stat-card__value">{{ stats().okunacak }}</span>
      <span class="stat-card__label">Okunacak</span>
    </div>
    <div class="stat-card stat-card--okunuyor">
      <span class="stat-card__value">{{ stats().okunuyor }}</span>
      <span class="stat-card__label">Okunuyor</span>
    </div>
    <div class="stat-card stat-card--okundu">
      <span class="stat-card__value">{{ stats().okundu }}</span>
      <span class="stat-card__label">Okundu</span>
    </div>
  </div>

  <div class="books-list__toolbar">
    <input
      type="text"
      class="books-list__search"
      placeholder="Kitap adı veya yazar ara..."
      [value]="searchTerm()"
      (input)="onSearchChange($any($event.target).value)"
    />
  </div>

@if (isLoading()) {
  <app-loading-spinner></app-loading-spinner>
}

  @if (!isLoading()) {
  <app-data-table
    [data]="sortedBooks()"
    [columns]="columns"
    (sortChange)="onSortChange($event)"
    (edit)="onEdit($event)"
    (delete)="onDeleteRequest($event)"
  >
    <app-empty-state
      emptyState
      mesaj="Henüz kitap eklenmemiş."
      butonMetni="İlk kitabını ekle"
      (butonaTiklandi)="goToAddBook()"
    ></app-empty-state>
  </app-data-table>
}

  @if (deleteTargetId() !== null) {
  <app-confirm-dialog
    [acikMi]="true"
    baslik="Kitabı Sil"
    mesaj="Bu kitabı silmek istediğinize emin misiniz? Bu işlem geri alınamaz."
    (onaylandi)="onDeleteConfirm()"
    (iptalEdildi)="onDeleteCancel()"
  ></app-confirm-dialog>
}
