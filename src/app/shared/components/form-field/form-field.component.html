<div class="form-field">
  <label *ngIf="label" [for]="inputId" class="form-field__label">
    {{ label }}
    <span *ngIf="required" class="form-field__required">*</span>
  </label>

  <input
    *ngIf="type !== 'select' && type !== 'textarea'"
    [id]="inputId"
    [type]="type"
    [formControl]="control"
    [placeholder]="placeholder"
    class="form-field__input"
    [class.form-field__input--invalid]="isInvalid"
  />

  <textarea
    *ngIf="type === 'textarea'"
    [id]="inputId"
    [formControl]="control"
    [placeholder]="placeholder"
    class="form-field__input"
    [class.form-field__input--invalid]="isInvalid"
    rows="4"
  ></textarea>

  <div class="form-field__error" *ngIf="isInvalid">
    {{ errorMessage }}
  </div>
</div>
